# Render blueprint — free-tier backend for Clinic AI.
# In Render: New → Blueprint → connect this repo. It reads this file.
# Set the secret env vars (marked sync:false) in the Render dashboard.
services:
  - type: web
    name: clinic-ai-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the app reads process.env.PORT.
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string
      - key: FRONTEND_URL
        sync: false          # your Vercel URL, e.g. https://clinic-ai.vercel.app
      - key: APP_BASE_URL
        sync: false          # this service's URL, e.g. https://clinic-ai-backend.onrender.com
      # Optional — leave blank to run in free mock mode until you have keys:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
