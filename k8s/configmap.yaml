apiVersion: v1
kind: ConfigMap
metadata:
  name: clinic-ai-config
  namespace: clinic-ai
data:
  NODE_ENV: "production"
  PORT: "4000"
  ANTHROPIC_MODEL: "claude-opus-4-8"
  WHATSAPP_API_VERSION: "v21.0"
---
# Secrets are managed via AWS Secrets Manager + External Secrets Operator in production.
# For local K8s testing use:
#   kubectl create secret generic clinic-ai-secrets --from-env-file=.env -n clinic-ai
