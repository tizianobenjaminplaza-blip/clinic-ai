# Requires: nginx ingress controller + cert-manager (Let's Encrypt)
# Install: helm install ingress-nginx ingress-nginx/ingress-nginx
#          helm install cert-manager jetstack/cert-manager --set installCRDs=true
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinic-ai-ingress
  namespace: clinic-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - app.clinic-ai.com
        - api.clinic-ai.com
      secretName: clinic-ai-tls
  rules:
    - host: app.clinic-ai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.clinic-ai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@clinic-ai.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
